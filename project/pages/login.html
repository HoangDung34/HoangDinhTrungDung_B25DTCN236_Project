<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../style/login.css">
</head>

<body>
    <div class="container">
        <h1>Đăng ký tài khoản</h1>
        <p class="sub">Đăng ký tài khoản để sử dụng dịch vụ</p>

        <div class="row">
            <div class="col">
                <label>Họ và tên đệm</label>
                <input type="text">
            </div>
            <div class="col">
                <label>Tên</label>
                <input type="text">
            </div>
        </div>

        <label>Email</label>
        <input type="email" placeholder="you@company.com">

        <label>Mật khẩu</label>
        <input type="password">

        <div class="checkbox">
            <label>
                <input type="checkbox">
                Bạn đồng ý với <a href="#">chính sách và điều khoản</a>
            </label>
        </div>

        <button>Đăng ký</button>

        <p class="login">
            Bạn đã có tài khoản? <a href="./register.html">Đăng nhập</a>
        </p>
    </div>
</body>

</html>
