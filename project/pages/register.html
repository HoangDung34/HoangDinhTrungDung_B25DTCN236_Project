<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../style/register.css">
</head>
<body>
    <div class="login-container">
        <h1>Đăng nhập</h1>
        <p class="subtitle">Đăng nhập tài khoản để sử dụng hệ thống quản lý.</p>

        <form id="login-from">
            <label>Email</label>
            <input type="email" placeholder="">

            <label>Mật khẩu</label>
            <input type="password" placeholder="">

            <div class="options">
                <label class="remember">
                    <input type="checkbox">
                    Nhớ tài khoản
                </label>
                <a href="#" class="forgot">Quên mật khẩu?</a>
            </div>

            <button type="submit">Đăng nhập</button>
        </form>

        <p class="register">
            Bạn chưa có tài khoản? <a href="./login.html">Đăng ký</a>
        </p>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
